name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout dsv-public
        uses: actions/checkout@v4

      - name: Clone dsv-app (private source repo)
        env:
          DSV_APP_TOKEN: ${{ secrets.DSV_APP_TOKEN }}
        run: |
          git clone https://x-access-token:${DSV_APP_TOKEN}@github.com/strimo378/dsv-app.git /home/runner/work/dsv-app/dsv-app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          channel: "stable"
          cache: true

      - name: Install Flutter dependencies
        run: |
          cd /home/runner/work/dsv-app/dsv-app/flutter_app
          flutter pub get
